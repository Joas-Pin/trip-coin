version: '3.8'

services:
  web:
    build: 
      context: .
      dockerfile: Dockerfile.prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Certificados SSL da VM
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Diretório para desafio ACME
      - /var/www/html:/var/www/html
    container_name: trip-app-web
