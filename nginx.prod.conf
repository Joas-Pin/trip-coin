server {
    listen 80;
    server_name trip-close.duckdns.org;

    # Redireciona para HTTPS, mas permite desafio ACME
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name trip-close.duckdns.org;

    root /usr/share/nginx/html;
    index index.html;

    # Certificados SSL (gerados via Certbot na VM)
    ssl_certificate /etc/letsencrypt/live/trip-close.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trip-close.duckdns.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Configuração para SPA (Single Page Application)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;
}
